<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <title>آپلود فایل</title>
  </head>
  <body>
    <div class="upload-container">
      <div class="file-wrapper">
        <input type="file" id="fileInput" class="input-file" />
        <div class="file-info">
          <span id="fileName" class="file-name">هیچ فایلی انتخاب نشده</span>
        </div>
        <button id="uploadBtn" class="upload-btn">آپلود</button>
      </div>
      <div id="status" class="status-message"></div>
    </div>

    <script>
      const fileInput = document.getElementById("fileInput");
      const uploadBtn = document.getElementById("uploadBtn");
      const statusDiv = document.getElementById("status");
      const fileNameSpan = document.getElementById("fileName");

      fileInput.addEventListener("change", function () {
        if (fileInput.files.length > 0) {
          fileNameSpan.textContent = fileInput.files[0].name;
        } else {
          fileNameSpan.textContent = "هیچ فایلی انتخاب نشده";
        }
      });

      function showStatus(message, isError = false) {
        statusDiv.textContent = message;
        statusDiv.style.display = "block";

        if (!isError) {
          setTimeout(() => {
            statusDiv.style.display = "none";
          }, 4000);
        }
      }

      uploadBtn.addEventListener("click", async () => {
        const file = fileInput.files[0];

        if (!file) {
          showStatus("لطفاً یک فایل انتخاب کنید", true);
          return;
        }

        if (file.size > 100 * 1024 * 1024) {
          showStatus("حجم فایل نباید بیشتر از 100 مگابایت باشد", true);
          return;
        }

        uploadBtn.disabled = true;
        uploadBtn.textContent = "در حال آپلود...";
        showStatus("در حال آپلود فایل...");

        try {
          const response = await fetch("/api/upload", {
            method: "POST",
            body: file,
            headers: {
              "Content-Type": file.type || "application/octet-stream",
            },
          });

          if (!response.ok) {
            throw new Error(`خطا: ${response.status}`);
          }

          const result = await response.json();

          if (result.success) {
            showStatus(`فایل "${file.name}" با موفقیت آپلود شد!`);
            fileInput.value = "";
            fileNameSpan.textContent = "هیچ فایلی انتخاب نشده";
          } else {
            throw new Error(result.error || "خطای ناشناخته");
          }
        } catch (error) {
          console.error("Upload error:", error);
          showStatus(`خطا: ${error.message}`, true);
        } finally {
          uploadBtn.disabled = false;
          uploadBtn.textContent = "آپلود";
        }
      });
    </script>
  </body>
</html>
