<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>رمز نگاری فارسی کانفیگ</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>فارسی ساز کانفیگ</h1>
      </header>
      <div class="tabs">
        <button class="tab-button active" data-tab="encode">قاطی کردن</button>
        <button class="tab-button" data-tab="decode">باز کردن</button>
      </div>
      <div class="content">
        <div id="encode" class="box-tab-content active">
          <div class="tab-content">
            <textarea
              id="encode-input"
              placeholder="آدرس کانفیگ رو وارد کن..."
            ></textarea>
            <div class="result-box">
              <pre id="encode-output"></pre>
            </div>
          </div>
          <button id="encode-copy">کپی</button>
        </div>
        <div id="decode" class="box-tab-content">
          <div class="tab-content">
            <textarea
              id="decode-input"
              placeholder="آدرس قاطی شده رو وارد کن..."
            ></textarea>
            <div class="result-box">
              <pre id="decode-output"></pre>
            </div>
          </div>
          <button id="decode-copy">کپی</button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <p class="footer-text">
           ساخته شده با عشق توسط 
          <a href="https://pentify.ir/" target="_blank" rel="noopener noreferrer" class="footer-link">
            آکادمی پنتیفای
          </a>
        </p>
        <div class="footer-glow"></div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
